replicaCount: 3

image:
  repository: ghcr.io/OWNER/hello-app
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

probes:
  enabled: true

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

jaeger:
  endpoint: "http://jaeger.monitoring:14268/api/traces"

ingress:
  enabled: true
  host: hello-app.local

serviceMonitor:
  enabled: false
  interval: 15s
  labels:
    release: monitoring
